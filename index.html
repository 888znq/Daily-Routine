<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Realistic Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #22c55e;
            --border-color: #334155;
            --danger-color: #ef4444;
            --edit-color: #f59e0b;
            --calc-op: #3b82f6;
            
            --shadow-ambient: rgba(0, 0, 0, 0.3);
            --shadow-deep: rgba(0, 0, 0, 0.7);
            --highlight-rim: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease; 
        }

        /* --- STATIC RAINBOW MODE --- */
        .rainbow-mode {
            background: linear-gradient(135deg, #ff2a2a, #ff7a00, #ffd700, #00d34b, #00a1ff, #a100ff, #ff007c);
        }

        /* --- VIEW MANAGEMENT --- */
        .app-view {
            display: none; 
            width: 100%;
            height: 100%;
            overflow-y: auto; 
            padding-bottom: 120px; /* Space for FABs */
        }
        
        .app-view.active {
            display: flex;
        }

        /* --- ROUTINE APP STYLES --- */
        #routineApp.active {
            display: grid;
            /* Strict 4 column layout */
            grid-template-columns: repeat(4, 1fr); 
            gap: 2px;
            background-color: var(--border-color);
            border: 2px solid var(--border-color);
            align-content: start; 
        }

        .grid-item {
            background-color: var(--surface-color);
            aspect-ratio: 1 / 1; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            box-shadow: inset 0 1px 1px var(--highlight-rim);
        }

        .grid-item.active-task {
            background-color: var(--accent-color);
            opacity: 0.8;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4); 
        }

        .grid-item.active-task .task-label {
            text-decoration: line-through;
            color: #ffffff;
        }

        .grid-item i, .grid-item svg {
            width: 28px;
            height: 28px;
            stroke-width: 2;
        }

        .task-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #cbd5e1;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Prevents text from overflowing */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Empty State Styling */
        .grid-item.empty i {
            opacity: 0.2;
        }

        /* Add Box Button Styling */
        .grid-item.add-btn {
            background-color: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
        }

        /* Edit Mode Animation */
        .edit-mode-active .grid-item:not(.empty):not(.add-btn) {
            border: 1px solid var(--edit-color);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        /* --- CALCULATOR APP STYLES --- */
        #calculatorApp {
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px; 
            padding-bottom: 120px; 
            box-sizing: border-box;
            max-width: 600px; 
            margin: 0 auto;
            background-color: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 24px;
            border: 1px solid var(--highlight-rim);
            margin-top: 20px;
            margin-bottom: 20px;
            height: calc(100% - 40px);
            box-shadow: 
                0 10px 15px -3px var(--shadow-ambient), 
                0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                0 0 100px 10px rgba(0,0,0,0.5), 
                inset 0 1px 0 var(--highlight-rim); 
        }

        .calc-display {
            font-size: 5rem; 
            text-align: right;
            margin-bottom: 2rem;
            padding-right: 15px;
            word-wrap: break-word;
            font-weight: 300;
            color: #a7f3d0; 
            line-height: 1;
            background-color: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 
                inset 0 4px 10px rgba(0,0,0,0.8), 
                inset 0 -1px 0 rgba(255,255,255,0.05), 
                0 2px 2px rgba(0,0,0,0.3); 
            text-shadow: 0 0 15px #22c55e; 
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px; 
        }

        .calc-btn {
            background-color: rgba(255, 255, 255, 0.03); 
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.6); 
            border-radius: 8px;
            padding: 10px 0; 
            font-size: 3.2rem; 
            line-height: 1; 
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 
                0 2px 0 0 rgba(0, 0, 0, 0.8), 
                0 4px 6px -1px var(--shadow-deep), 
                inset 0 1px 0 var(--highlight-rim); 
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .calc-btn:active { 
            transform: translateY(2px);
            background-color: rgba(255, 255, 255, 0.15); 
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 0 0 0 transparent,
                inset 0 4px 8px var(--shadow-deep); 
        }
        
        .calc-btn.op { 
            color: #000000; 
            border-color: rgba(0, 0, 0, 0.4); 
            background-color: rgba(255, 255, 255, 0.2); 
            text-shadow: none;
            font-size: 3.5rem; 
            box-shadow: 
                0 2px 0 0 rgba(0, 0, 0, 0.4),
                0 4px 6px -1px var(--shadow-deep),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        
        .calc-btn.op:active {
            box-shadow: 
                0 0 0 0 transparent,
                inset 0 4px 8px rgba(0, 0, 0, 0.5); 
        }

        .calc-btn.action { 
            color: #ffffff; 
            border-color: rgba(255,255,255,0.9);
            font-weight: 600;
        }
        
        .calc-btn.zero { grid-column: span 2; }

        /* --- FABs --- */
        .fab {
            position: fixed;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s;
            z-index: 101; 
            -webkit-tap-highlight-color: transparent;
            box-shadow: 
                0 6px 10px -2px rgba(0,0,0,0.3), 
                0 15px 30px -5px rgba(0,0,0,0.6), 
                inset 0 1px 1px var(--highlight-rim); 
        }

        .fab:active { 
            transform: scale(0.92) translateY(3px);
            box-shadow: 
                0 2px 4px -1px rgba(0,0,0,0.3),
                0 6px 10px -2px rgba(0,0,0,0.6); 
        }
        .fab i { width: 26px; height: 26px; }

        /* Switcher (Bottom Left) */
        #switchBtn {
            bottom: max(24px, env(safe-area-inset-bottom));
            left: max(24px, env(safe-area-inset-left));
            background-color: rgba(30, 41, 59, 0.95); 
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Routine Reset (Bottom Right) */
        #resetBtn {
            bottom: max(24px, env(safe-area-inset-bottom));
            right: max(24px, env(safe-area-inset-right));
            background-color: var(--danger-color);
        }

        /* Edit Toggle (Above Reset) */
        #editBtn {
            bottom: max(100px, calc(env(safe-area-inset-bottom) + 100px));
            right: max(24px, env(safe-area-inset-right));
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
        }

        #editBtn.active {
            background-color: var(--edit-color);
            border-color: #fff;
        }

    </style>
</head>
<body>

    <div id="routineApp" class="app-view active"></div>

    <div id="calculatorApp" class="app-view">
        <div class="calc-display" id="calcDisplay">0</div>
        <div class="calc-grid">
            <button class="calc-btn action" onclick="calcAction('C')">C</button>
            <button class="calc-btn action" onclick="calcAction('DEL')"><i data-lucide="delete" style="width:36px; height:36px;"></i></button>
            <button class="calc-btn op" onclick="calcAction('%')">%</button>
            <button class="calc-btn op" onclick="calcAction('/')">÷</button>
            
            <button class="calc-btn" onclick="calcAction('7')">7</button>
            <button class="calc-btn" onclick="calcAction('8')">8</button>
            <button class="calc-btn" onclick="calcAction('9')">9</button>
            <button class="calc-btn op" onclick="calcAction('*')">×</button>
            
            <button class="calc-btn" onclick="calcAction('4')">4</button>
            <button class="calc-btn" onclick="calcAction('5')">5</button>
            <button class="calc-btn" onclick="calcAction('6')">6</button>
            <button class="calc-btn op" onclick="calcAction('-')">−</button>
            
            <button class="calc-btn" onclick="calcAction('1')">1</button>
            <button class="calc-btn" onclick="calcAction('2')">2</button>
            <button class="calc-btn" onclick="calcAction('3')">3</button>
            <button class="calc-btn op" onclick="calcAction('+')">+</button>
            
            <button class="calc-btn zero" onclick="calcAction('0')">0</button>
            <button class="calc-btn" onclick="calcAction('.')">.</button>
            <button class="calc-btn op" onclick="calcAction('=')">=</button>
        </div>
    </div>

    <button id="switchBtn" class="fab" aria-label="Switch App">
        <i data-lucide="calculator" id="switchIcon"></i>
    </button>
    
    <button id="editBtn" class="fab" aria-label="Edit Routine">
        <i data-lucide="pencil"></i>
    </button>

    <button id="resetBtn" class="fab" aria-label="Reset Routine">
        <i data-lucide="rotate-ccw"></i>
    </button>

    <script>
        // --- 1. APP SWITCHER LOGIC ---
        let currentApp = 'routine';
        const routineApp = document.getElementById('routineApp');
        const calcApp = document.getElementById('calculatorApp');
        const resetBtn = document.getElementById('resetBtn');
        const editBtn = document.getElementById('editBtn');
        const switchIcon = document.getElementById('switchIcon');

        document.getElementById('switchBtn').onclick = () => {
            if (currentApp === 'routine') {
                routineApp.classList.remove('active');
                calcApp.classList.add('active');
                resetBtn.style.display = 'none'; 
                editBtn.style.display = 'none'; // Hide edit button in calc
                switchIcon.setAttribute('data-lucide', 'layout-grid'); 
                document.body.classList.add('rainbow-mode'); 
                currentApp = 'calculator';
            } else {
                calcApp.classList.remove('active');
                routineApp.classList.add('active');
                resetBtn.style.display = 'flex'; 
                editBtn.style.display = 'flex'; 
                switchIcon.setAttribute('data-lucide', 'calculator'); 
                document.body.classList.remove('rainbow-mode'); 
                currentApp = 'routine';
            }
            lucide.createIcons(); 
        };

        // --- 2. DYNAMIC ROUTINE TRACKER LOGIC ---
        // Initialize with 20 empty objects if no local storage exists
        let savedState = JSON.parse(localStorage.getItem('dynamicRoutine')) || Array.from({length: 20}, () => ({ text: '', done: false }));
        let isEditMode = false;

        editBtn.onclick = () => {
            isEditMode = !isEditMode;
            editBtn.classList.toggle('active');
            if(isEditMode) {
                routineApp.classList.add('edit-mode-active');
            } else {
                routineApp.classList.remove('edit-mode-active');
            }
        };

        function saveAndRender() {
            localStorage.setItem('dynamicRoutine', JSON.stringify(savedState));
            renderGrid();
        }

        function renderGrid() {
            routineApp.innerHTML = '';
            
            // Render Tasks
            savedState.forEach((item, index) => {
                const div = document.createElement('div');
                
                if (!item.text) {
                    // Blank Box
                    div.className = 'grid-item empty';
                    div.innerHTML = `<i data-lucide="plus"></i>`;
                    div.onclick = () => {
                        let taskName = prompt("Enter a new task:");
                        if (taskName && taskName.trim() !== "") {
                            savedState[index].text = taskName.trim();
                            saveAndRender();
                        }
                    };
                } else {
                    // Filled Task Box
                    div.className = `grid-item ${item.done ? 'active-task' : ''}`;
                    // Using a generic check-circle for custom user tasks
                    div.innerHTML = `
                        <i data-lucide="check-circle-2"></i>
                        <span class="task-label">${item.text}</span>
                    `;
                    
                    div.onclick = () => {
                        if (isEditMode) {
                            let newName = prompt("Edit task (leave blank to delete):", item.text);
                            if (newName === null) return; // Cancelled
                            
                            if (newName.trim() === "") {
                                savedState[index].text = ""; // Clears the box
                                savedState[index].done = false;
                            } else {
                                savedState[index].text = newName.trim();
                            }
                            saveAndRender();
                        } else {
                            // Toggle Done Status
                            savedState[index].done = !savedState[index].done;
                            saveAndRender();
                        }
                    };
                }
                routineApp.appendChild(div);
            });

            // Add "Add Box" Tile at the end
            const addDiv = document.createElement('div');
            addDiv.className = 'grid-item add-btn';
            addDiv.innerHTML = `
                <i data-lucide="layout-plus" style="opacity:0.5;"></i>
                <span class="task-label" style="opacity:0.5;">Add Box</span>
            `;
            addDiv.onclick = () => {
                savedState.push({ text: '', done: false });
                saveAndRender();
                // Auto-scroll to bottom to see new box
                routineApp.scrollTop = routineApp.scrollHeight;
            };
            routineApp.appendChild(addDiv);

            lucide.createIcons();
        }

        // Reset clears only the 'done' status, not the text!
        resetBtn.onclick = () => {
            if (confirm("Reset all checks for today?")) {
                savedState = savedState.map(item => ({ ...item, done: false }));
                saveAndRender();
            }
        };
        
        renderGrid();

        // --- 3. CALCULATOR LOGIC ---
        const display = document.getElementById('calcDisplay');
        let calcExpr = '';

        function calcAction(val) {
            if (val === 'C') {
                calcExpr = '';
                display.innerText = '0';
            } else if (val === 'DEL') {
                calcExpr = calcExpr.slice(0, -1);
                display.innerText = calcExpr || '0';
            } else if (val === '=') {
                try {
                    let safeExpr = calcExpr.replace(/×/g, '*').replace(/÷/g, '/');
                    let result = new Function('return ' + safeExpr)();
                    result = Math.round(result * 100000000) / 100000000; 
                    display.innerText = result;
                    calcExpr = result.toString();
                } catch (e) {
                    display.innerText = 'Error';
                    calcExpr = '';
                }
            } else {
                if (calcExpr === '0' && val !== '.') calcExpr = '';
                
                let visualVal = val;
                if(val === '*') visualVal = '×';
                if(val === '/') visualVal = '÷';
                
                calcExpr += visualVal;
                display.innerText = calcExpr;
            }
        }
    </script>
</body>
</html>
